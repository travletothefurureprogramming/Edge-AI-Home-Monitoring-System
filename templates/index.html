<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge AI Home Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 { margin: 2rem 0; font-weight: 600; letter-spacing: -0.05em; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }

        .card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            padding: 24px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        h3 { margin-top: 0; font-size: 1.1rem; color: var(--accent); }

        button { 
            background: rgba(255,255,255,0.05);
            color: white; 
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 24px; 
            margin: 5px; 
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
        .btn-on:hover { background: #166534; }
        .btn-off:hover { background: #991b1b; }
    </style>
</head>
<body>

    <h1>Edge AI Dashboard</h1>

    <div class="container">
        <div class="card">
            <h3>Led Strip</h3>
            <button class="btn-on" onclick="sendCommand('light', 'ON')">ON</button>
            <button class="btn-off" onclick="sendCommand('light', 'OFF')">OFF</button>
        </div>

        <div class="card">
            <h3>Maria TV</h3>
            <button onclick="sendTV('Maria_TV','Maria_Room','TV','1','power')">Power</button>
            <button onclick="sendTV('Maria_TV','Maria_Room','TV','1','home')">Home</button>
        </div>

        <div class="card">
            <h3>Bedroom's TV</h3>
            <button onclick="sendTV('Bedrooms_TV','Main_Bedroom','TV','1','power')">Power</button>
            <button onclick="sendTV('Bedrooms_TV','Main_Bedroom','TV','1','home')">Home</button>
        </div>

        <div class="card">
            <h3>Gregory's TV</h3>
            <button onclick="sendTV('Gregorys_TV','Gregorys_Bedroom','TV','1','power')">Power</button>
            <button onclick="sendTV('Gregorys_TV','Gregorys_Bedroom','TV','1','home')">Home</button>
        </div>

    </div>

    <script>
        const API_URL = "http://192.168.1.2:8080";

        async function request(endpoint, body) {
            try {
                const r = await fetch(`${API_URL}/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await r.json();
                console.log("Success:", data);
            } catch (err) {
                console.error("Error:", err);
            }
        }

        function sendCommand(type, cmd) {
            request(type, { device: "tapo_led_strip", room: "Gregory's_Bedroom", command: cmd, type:type});
        }

        function sendTV(device, room, type, number, cmd) {
            request("tv", { room: room, type: type, number: number, command: cmd, device: device});
        }
    </script>
</body>
</html>
